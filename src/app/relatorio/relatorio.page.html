<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" color="primary" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Relatório de Parada</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="sessao-titulo">
    <ion-text color="medium">
      <h2>Dados do Operador</h2>
    </ion-text>
  </div>

  <ion-item class="campo-form" lines="none">
    <ion-input label="Crachá" labelPlacement="floating" type="number" placeholder="Digite o crachá"
      [(ngModel)]="dadosFormulario.cracha_op" (ionBlur)="buscarNomeOperador()">
    </ion-input>
  </ion-item>

  <ion-item class="campo-form" lines="none">
    <ion-input label="Nome do Operador" labelPlacement="floating" readonly="true"
      [(ngModel)]="dadosFormulario.nome_operador">
    </ion-input>
  </ion-item>

  <div class="sessao-titulo">
    <ion-text color="medium">
      <h2>Equipamento</h2>
    </ion-text>
  </div>

  <ion-item class="campo-form" lines="none">
    <ion-input label="Código do Equipamento" labelPlacement="floating" type="text" placeholder="Ex: MQ-01"
      [(ngModel)]="dadosFormulario.cod_equip" (ionBlur)="buscarMaquina()">
    </ion-input>
  </ion-item>

  <ion-item class="campo-form" lines="none">
    <ion-input label="Nome da Máquina" labelPlacement="floating" readonly="true"
      [(ngModel)]="dadosFormulario.nome_equipamento">
    </ion-input>
  </ion-item>

  <ion-item class="campo-form" lines="none">
    <ion-input label="Linha" labelPlacement="floating" readonly="true" [(ngModel)]="dadosFormulario.linha">
    </ion-input>
  </ion-item>

  <div class="sessao-titulo">
    <ion-text color="medium">
      <h2>Detalhes da Parada</h2>
    </ion-text>
  </div>

  <ion-row>
    <ion-col size="6">
      <ion-item class="campo-form" lines="none">
        <ion-input label="Início" labelPlacement="floating" type="datetime-local"
          [(ngModel)]="dadosFormulario.hora_inicio">
        </ion-input>
      </ion-item>
    </ion-col>
    <ion-col size="6">
      <ion-item class="campo-form" lines="none">
        <ion-input label="Fim" labelPlacement="floating" type="datetime-local" [(ngModel)]="dadosFormulario.hora_fim">
        </ion-input>
      </ion-item>
    </ion-col>
  </ion-row>

  <ion-item class="campo-form" lines="none">
    <ion-select 
      label="Causa da Parada" 
      labelPlacement="floating" 
      [(ngModel)]="dadosFormulario.causa"
      (ionChange)="filtrarMotivos()" 
      interface="action-sheet"
      cancelText="Cancelar"
      placeholder="Selecione a causa">
      
      <ion-select-option *ngFor="let categoria of categoriasMotivos" [value]="categoria.nome">
        {{ categoria.nome }}
      </ion-select-option>
      
    </ion-select>
  </ion-item>

  <ion-item class="campo-form" lines="none">
    <ion-select 
      label="Motivo Específico" 
      labelPlacement="floating" 
      [(ngModel)]="dadosFormulario.cod_motivo"
      interface="action-sheet"
      cancelText="Cancelar"
      placeholder="Selecione o motivo detalhado"
      [disabled]="!dadosFormulario.causa"> <ion-select-option *ngFor="let motivo of motivosFiltrados" [value]="motivo.valor">
        {{ motivo.texto }}
      </ion-select-option>
      
    </ion-select>
  </ion-item>

  <ion-item class="campo-form" lines="none">
    <ion-textarea label="Descrição do Problema" labelPlacement="floating" rows="3"
      placeholder="Descreva o que ocorreu..." [(ngModel)]="dadosFormulario.descricao">
    </ion-textarea>
  </ion-item>

  <ion-button expand="block" shape="round" color="primary" class="ion-margin-top botao-salvar"
    (click)="enviarRelatorio()">
    Registrar Apontamento
  </ion-button>

</ion-content>
