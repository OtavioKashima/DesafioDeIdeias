<ion-header class="ion-no-border">
  <ion-toolbar style="--background: #FAFAFA;">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" color="primary" text=""></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="fundo-app">
  
  <div class="header-minimal">
    <h1>Painel de Paradas</h1>
    <p>Acompanhamento de chão de fábrica</p>
  </div>

  <div class="list-container">
    
    <div class="relatorio-card" *ngFor="let item of relatorios" (click)="abrir(item.id)">
      <div class="relatorio-icon">
        <ion-icon name="document-text"></ion-icon>
      </div>
      
      <div class="relatorio-content">
        <h2>{{ item.equipamento || 'Máquina Stop' }}</h2>
        <p>Linha: {{ item.linha || 'A' }} • Lote: {{ item.lote || '10293' }}</p>
        <span class="badge-time">
          <ion-icon name="time-outline"></ion-icon>
          {{ item.data | date:'HH:mm' }}
        </span>
      </div>

      <ion-icon name="chevron-forward" class="arrow"></ion-icon>
    </div>

  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed" style="margin-bottom: 16px; margin-right: 8px;">
    <ion-fab-button class="fab-orange" (click)="novo()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
